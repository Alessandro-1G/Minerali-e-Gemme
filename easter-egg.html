<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easter Egg | Alessandro Iovine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 2.5vw, 2rem);
      font-family: "Manrope", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #eaf5ff;
      background: url("assets/images/easter-emerald-specimen.jpg") center center / cover no-repeat fixed #04090f;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(5, 15, 27, 0.72), rgba(4, 12, 22, 0.8)),
        radial-gradient(circle at 50% 20%, rgba(86, 163, 216, 0.22) 0%, rgba(86, 163, 216, 0) 54%),
        repeating-linear-gradient(
          128deg,
          transparent 0 54px,
          rgba(162, 201, 235, 0.07) 54px 56px,
          transparent 56px 112px
        );
      z-index: 0;
    }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #ecf9ff, rgba(236, 249, 255, 0));
      pointer-events: none;
      opacity: 0.48;
      animation: drift 9s linear infinite;
      z-index: 0;
    }

    .sparkle.s1 { top: 14%; left: 12%; animation-delay: -1s; }
    .sparkle.s2 { top: 32%; left: 84%; animation-delay: -3s; }
    .sparkle.s3 { top: 70%; left: 20%; animation-delay: -5s; }
    .sparkle.s4 { top: 80%; left: 72%; animation-delay: -7s; }

    .shell {
      position: relative;
      z-index: 1;
      width: min(980px, 94vw);
      border: 1px solid rgba(181, 212, 240, 0.42);
      border-radius: 24px;
      padding: clamp(1.4rem, 3vw, 2.8rem);
      text-align: center;
      background: linear-gradient(165deg, rgba(12, 26, 42, 0.9), rgba(10, 20, 34, 0.95));
      box-shadow:
        0 30px 70px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(195, 221, 245, 0.24);
      backdrop-filter: blur(1.4px);
    }

    .eyebrow {
      margin: 0;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #7fd8ff;
      font-weight: 800;
    }

    h1 {
      margin: 0.7rem 0 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.7rem);
      line-height: 1.12;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0.8rem auto 1.5rem;
      max-width: 62ch;
      color: #bdd4ea;
      font-size: clamp(0.98rem, 1.7vw, 1.12rem);
    }

    .logo-wrap {
      width: min(680px, 90%);
      margin: 0 auto;
      border-radius: 16px;
      padding: clamp(0.45rem, 1.5vw, 0.8rem);
      background: linear-gradient(140deg, rgba(23, 43, 64, 0.78), rgba(11, 24, 38, 0.92));
      border: 1px solid rgba(167, 204, 236, 0.3);
      box-shadow: 0 14px 38px rgba(5, 12, 20, 0.45);
    }

    .logo-wrap img {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 10px 24px rgba(109, 185, 236, 0.34));
    }

    .line {
      margin: 1.4rem auto 0;
      width: min(380px, 68%);
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(126, 202, 255, 0.88), transparent);
    }

    @keyframes drift {
      0% { transform: translate3d(0, 0, 0) scale(0.9); opacity: 0.2; }
      35% { opacity: 0.65; }
      100% { transform: translate3d(0, -120px, 0) scale(1.35); opacity: 0; }
    }
  </style>
</head>
<body>
  <span class="sparkle s1" aria-hidden="true"></span>
  <span class="sparkle s2" aria-hidden="true"></span>
  <span class="sparkle s3" aria-hidden="true"></span>
  <span class="sparkle s4" aria-hidden="true"></span>

  <main class="shell">
    <p class="eyebrow">Easter Egg sbloccato</p>
    <h1>Questo sito &egrave; stato creato da Alessandro Iovine</h1>
    <p class="subtitle">Progetto didattico con identit&agrave; grafica originale, struttura tecnica e contenuti mineralogici avanzati.</p>
    <div class="logo-wrap">
      <img src="assets/images/alessandro-iovine-logo.png" alt="Logo Alessandro Iovine 1^G">
    </div>
    <div class="line" aria-hidden="true"></div>
  </main>
</body>
</html>
